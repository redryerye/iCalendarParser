name: ci

on:
  - push
  - pull_request

jobs:
  check-commit:
    runs-on: macos-latest

    steps:
      - name: Current platform versions
        run: |
          xcodebuild -version
          swift --version
          swiftlint version

      - name: Checkout default branch
        uses: actions/checkout@v2

      - name: Run lint
        run: |
          make lint

      - name: Run test
        run: |
          make test
